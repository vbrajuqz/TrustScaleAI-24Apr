<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1360,initial-scale=1">
<title>TrustScaleAI Companion — Full App Mockup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{
  --bg:#F4F6FA; --paper:#FFFFFF; --ink:#0B2240; --ink-2:#1A365D; --sub:#4A5568; --muted:#718096;
  --line:#E2E8F0; --line-2:#EDF2F7; --navy:#1A365D; --teal:#0E7C7B; --teal-2:#38B2AC;
  --amber:#D69E2E; --red:#C53030; --green:#2F855A; --violet:#6B46C1;
  --scope:#1A365D; --shortlist:#2C5282; --evidence:#0E7C7B; --decision:#38B2AC;
  --radius:10px; --sh1:0 1px 2px rgba(16,24,40,.05); --sh2:0 4px 12px rgba(16,24,40,.08);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:"Inter",system-ui,sans-serif;font-size:14px;line-height:1.5}
h1,h2,h3,h4{font-family:"Manrope",sans-serif;color:var(--ink);margin:0;line-height:1.2;font-weight:800}
h1{font-size:28px}h2{font-size:22px}h3{font-size:17px;font-weight:700}h4{font-size:14px;font-weight:700}
.mono{font-family:"JetBrains Mono",monospace;font-variant-numeric:tabular-nums}
a{color:inherit;text-decoration:none}
button{font:inherit;color:inherit;cursor:pointer;border:none;background:none}
.muted{color:var(--muted)}.sub{color:var(--sub)}.small{font-size:12.5px}
.eyebrow{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:700}

/* ===== Buttons ===== */
.btn{display:inline-flex;gap:6px;align-items:center;justify-content:center;padding:7px 12px;border-radius:8px;font-size:12.5px;font-weight:600;border:1px solid var(--line);background:var(--paper);color:var(--ink);transition:all .14s}
.btn:hover{background:var(--line-2);border-color:#CBD5E0}
.btn.primary{background:var(--navy);color:#fff;border-color:var(--navy)}
.btn.primary:hover{background:#112a4d}
.btn.teal{background:var(--teal);color:#fff;border-color:var(--teal)}
.btn.teal:hover{background:#0a6361}
.btn.ghost{background:transparent;border-color:transparent;color:var(--sub)}
.btn.ghost:hover{background:var(--line-2);color:var(--ink)}
.btn.danger{background:#fff;color:var(--red);border-color:#FED7D7}
.btn.danger:hover{background:#FFF5F5}
.btn.sm{padding:4px 9px;font-size:11.5px;border-radius:6px}
.btn.xs{padding:2px 7px;font-size:11px;border-radius:5px}
.btn.icon{width:30px;height:30px;padding:0;justify-content:center}
.btn.full{width:100%;justify-content:center}

/* ===== Chips / badges ===== */
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:999px;background:#EDF2F7;color:#2D3748;font-size:11.5px;font-weight:600;white-space:nowrap}
.chip.g{background:#C6F6D5;color:#22543D}
.chip.a{background:#FEF5E7;color:#7B341E}
.chip.r{background:#FED7D7;color:#742A2A}
.chip.b{background:#BEE3F8;color:#2A4365}
.chip.v{background:#E9D8FD;color:#44337A}
.chip.t{background:var(--teal);color:#fff}
.chip.n{background:var(--navy);color:#fff}
.chip.outline{background:transparent;border:1px solid var(--line);color:var(--sub)}
.chip.tA{background:#0E7C7B;color:#fff}
.chip.tB{background:#38B2AC;color:#fff}
.chip.tC{background:#B2DFDB;color:#134E4A}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%}

/* ===== Cards ===== */
.card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--sh1);overflow:hidden}
.card .hd{padding:12px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px}
.card .hd h3{margin:0}
.card .hd .sub{font-size:12px}
.card .bd{padding:14px}

/* ===== Tables ===== */
.card{overflow-x:auto}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:10px 12px;background:#F7FAFC;color:#2D3748;font-weight:600;font-size:11.5px;letter-spacing:.03em;border-bottom:1px solid var(--line);text-transform:uppercase;white-space:nowrap}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--line-2);vertical-align:top}
.tbl tbody tr:hover{background:#FAFBFC}
.tbl tbody tr.click{cursor:pointer}
.tbl .num{text-align:right;font-variant-numeric:tabular-nums;font-family:"JetBrains Mono",monospace;font-size:12.5px}

/* ===== Forms ===== */
.fld{display:flex;flex-direction:column;gap:5px;min-width:0}
.fld label{font-size:11.5px;font-weight:600;color:#2D3748}
.fld .hint{font-size:11px;color:var(--muted)}
.fld input,.fld select,.fld textarea{border:1px solid var(--line);border-radius:7px;padding:8px 10px;font:inherit;background:#fff;outline:none;color:var(--ink);box-sizing:border-box;width:100%;max-width:100%}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--teal-2);box-shadow:0 0 0 3px rgba(56,178,172,.15)}
.fld textarea{resize:vertical;min-height:80px}
.fgrid{display:grid;gap:12px;grid-template-columns:repeat(2,minmax(0,1fr))}
.fgrid .full{grid-column:1/-1}

/* ===== Auth pages ===== */
.auth-shell{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;background:var(--bg)}
.auth-shell .left{background:linear-gradient(155deg,#0B2240 0%,#1A365D 50%,#234E52 100%);color:#fff;padding:48px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
.auth-shell .left:after{content:"";position:absolute;inset:auto -80px -80px auto;width:320px;height:320px;border-radius:50%;background:radial-gradient(circle,rgba(56,178,172,.4),transparent 70%)}
.auth-shell .right{padding:48px;display:flex;flex-direction:column;justify-content:center;max-width:600px;margin:0 auto;width:100%;box-sizing:border-box}
.brand{display:flex;align-items:center;gap:10px;font-family:"Manrope",sans-serif;font-weight:800;font-size:17px}
.brand .mark{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--teal),var(--teal-2));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800}
.auth-shell .left .brand{font-size:20px;color:#fff}
.auth-shell .left .brand .mark{background:rgba(255,255,255,.15);color:#fff}
.auth-hero h1{color:#fff;font-size:36px;line-height:1.15;margin:28px 0 12px}
.auth-hero p{color:#A0AEC0;max-width:440px}
.auth-hero ul{list-style:none;padding:0;margin:24px 0 0;display:grid;gap:10px}
.auth-hero li{display:flex;gap:10px;align-items:flex-start;font-size:13px;color:#CBD5E0}
.auth-hero li b{color:#fff}
.auth-footer{color:rgba(255,255,255,.5);font-size:12px}
.auth-card{background:#fff;padding:40px 36px;border-radius:14px;border:1px solid var(--line);box-shadow:var(--sh2);box-sizing:border-box;width:100%}
.auth-card h2{font-size:22px;margin-bottom:4px}
.auth-card .tabs{display:flex;gap:2px;background:#F7FAFC;padding:4px;border-radius:10px;margin:18px 0}
.auth-card .tabs button{flex:1;padding:8px;border-radius:7px;font-weight:600;font-size:12.5px;color:var(--sub)}
.auth-card .tabs button.on{background:var(--paper);color:var(--ink);box-shadow:var(--sh1)}

/* ===== Three-zone shell =====
   Optimised for 1920x1080 @ 100% — nav 260 / main flexible / rail 320 leaves ~1340 for main. */
.three-zone{display:grid;grid-template-columns:260px minmax(0,1fr) 320px;min-height:100vh;grid-template-rows:56px 54px 1fr 44px;grid-template-areas:"nav top top" "nav pgbar pgbar" "nav main rail" "nav meter meter"}
.three-zone.no-rail{grid-template-columns:260px minmax(0,1fr)}
.three-zone.no-rail{grid-template-areas:"nav top" "nav pgbar" "nav main" "nav meter"}
.three-zone .nav{grid-area:nav;background:var(--paper);border-right:1px solid var(--line);padding:16px 14px;overflow-y:auto;position:sticky;top:0;height:100vh;min-width:0}
.three-zone .top{grid-area:top;background:var(--paper);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 20px;gap:12px;position:sticky;top:0;z-index:5;min-width:0}
.three-zone .pgbar{grid-area:pgbar;background:var(--paper);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 20px;gap:8px;position:sticky;top:56px;z-index:4;overflow-x:auto;min-width:0}
.three-zone .main{grid-area:main;padding:22px 28px 80px;overflow-x:auto;background:var(--bg);min-width:0}
.three-zone .rail{grid-area:rail;background:var(--paper);border-left:1px solid var(--line);padding:18px;overflow-y:auto;min-width:0}
.three-zone .meter{grid-area:meter;background:var(--paper);border-top:1px solid var(--line);padding:6px 20px;display:flex;align-items:center;gap:16px;position:sticky;bottom:0}
@media (max-width: 1440px){
  .three-zone{grid-template-columns:240px minmax(0,1fr) 300px}
  .three-zone.no-rail{grid-template-columns:240px minmax(0,1fr)}
  .three-zone .main{padding:20px 22px 80px}
}

/* Phase + Gate top nav bar */
.pgbar .grp-lbl{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-right:4px;flex-shrink:0}
.pgbar .divider{width:1px;height:26px;background:var(--line);margin:0 8px;flex-shrink:0}
.pgpill{display:inline-flex;align-items:center;gap:7px;padding:6px 11px;border-radius:8px;font-size:12px;font-weight:600;border:1px solid var(--line);background:#fff;color:var(--ink);cursor:pointer;white-space:nowrap;transition:all .14s;flex-shrink:0}
.pgpill:hover{background:var(--line-2)}
.pgpill.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.pgpill .pgnum{font-weight:800;font-family:"Manrope";font-size:12.5px}
.pgpill .pctbar{width:38px;height:4px;background:var(--line);border-radius:2px;overflow:hidden}
.pgpill.on .pctbar{background:rgba(255,255,255,.2)}
.pgpill .pctbar > div{height:100%;background:var(--teal)}
.pgpill.on .pctbar > div{background:#fff}
.pggate{display:inline-flex;align-items:center;gap:5px;padding:5px 9px 5px 8px;border-radius:999px;font-size:11.5px;font-weight:700;border:1.5px dashed var(--teal);background:#E6FFFA;color:var(--navy);cursor:pointer;white-space:nowrap;transition:all .14s;flex-shrink:0}
.pggate:hover{background:#B2F5EA}
.pggate.on{background:var(--teal);color:#fff;border-color:var(--teal);border-style:solid}
.pggate .gdot{font-size:10px;color:var(--teal);line-height:1}
.pggate.on .gdot{color:#fff}
.pggate.pass .gdot{color:#2F855A}
.pggate.now .gdot{color:#C05621}
.pggate.next .gdot{color:#718096}
.pggate .gnum{font-weight:800;font-family:"Manrope";font-size:12px;letter-spacing:.02em}
.pggate .gst{font-size:9.5px;padding:1px 5px;border-radius:4px;font-weight:700;letter-spacing:.02em;text-transform:uppercase}
.pggate .gst.pass{background:#C6F6D5;color:#22543D}
.pggate .gst.now{background:#FEEBC8;color:#7B341E}
.pggate .gst.next{background:#EDF2F7;color:#2D3748}
.pggate.on .gst{background:rgba(255,255,255,.22);color:#fff}

/* +New tile pane */
.tile-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.new-tile{background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px;cursor:pointer;transition:all .14s;display:flex;flex-direction:column;gap:8px;text-align:left}
.new-tile:hover{border-color:var(--teal);background:#E6FFFA;transform:translateY(-1px);box-shadow:var(--sh2)}
.new-tile .tico{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;background:#F7FAFC;color:var(--teal);border:1px solid var(--line-2)}
.new-tile h4{font-size:13.5px;font-weight:700;margin:0;color:var(--ink)}
.new-tile p{font-size:11.5px;color:var(--muted);margin:0;line-height:1.4}
.new-tile .tmeta{display:flex;gap:5px;margin-top:auto}

/* NavRail */
.nav .logo{display:flex;gap:9px;align-items:center;padding:4px 6px 14px;border-bottom:1px solid var(--line);margin-bottom:14px}
.nav .logo h3{font-size:15px;font-weight:800}
.nav .nav-section{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:700;padding:14px 8px 6px}
.nav .nav-link{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;font-size:12.5px;font-weight:500;color:var(--ink);cursor:pointer;transition:background .12s}
.nav .nav-link:hover{background:var(--line-2)}
.nav .nav-link.on{background:#E6FFFA;color:var(--teal);font-weight:600}
.nav .nav-link .dot{flex-shrink:0}
.nav .nav-link .bar{flex:1;height:4px;background:var(--line);border-radius:3px;overflow:hidden;margin-left:auto;max-width:60px}
.nav .nav-link .bar > div{height:100%}
.nav .nav-link .ico{width:18px;height:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.nav .nav-link.on .ico{color:var(--teal)}

/* Topbar */
.topbar{display:flex;align-items:center;gap:10px;width:100%}
.topbar .crumbs{display:flex;gap:6px;align-items:center;font-size:12.5px;color:var(--sub)}
.topbar .crumbs b{color:var(--ink)}
.topbar .search{background:var(--line-2);border-radius:8px;padding:6px 10px;display:flex;align-items:center;gap:6px;color:var(--muted);font-size:12px;min-width:260px;cursor:pointer}
.topbar .search .kbd{background:#fff;border:1px solid var(--line);border-radius:4px;padding:0 5px;font-family:"JetBrains Mono";font-size:10px;color:var(--sub)}

/* Insight rail */
.rail .section{margin-bottom:18px}
.rail .section h4{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.rail .insight-card{background:#F7FAFC;border:1px solid var(--line);border-radius:8px;padding:12px}
.rail .insight-card .ttl{font-weight:700;font-size:12.5px;margin-bottom:4px}
.rail .insight-card .txt{color:var(--sub);font-size:12px;line-height:1.5}

/* Gate meter bar */
.meter .bar{flex:1;height:8px;background:var(--line);border-radius:4px;overflow:hidden}
.meter .bar > div{height:100%;background:linear-gradient(90deg,#38B2AC,#0E7C7B)}

/* Modal / drawer */
.modal-overlay{position:fixed;inset:0;background:rgba(11,34,64,.55);z-index:40;display:flex;align-items:center;justify-content:center;padding:40px}
.modal{background:#fff;border-radius:12px;max-width:640px;width:100%;max-height:86vh;overflow:auto;box-shadow:0 24px 60px rgba(0,0,0,.25)}
.modal .hd{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.modal .bd{padding:20px}
.modal .ft{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;background:#F7FAFC}
.drawer-overlay{position:fixed;inset:0;background:rgba(11,34,64,.3);z-index:38}
.drawer{position:fixed;top:0;right:0;height:100vh;width:440px;background:#fff;border-left:1px solid var(--line);z-index:39;display:flex;flex-direction:column;box-shadow:-12px 0 30px rgba(0,0,0,.08)}
.drawer .hd{padding:16px 20px;border-bottom:1px solid var(--line)}
.drawer .bd{flex:1;overflow-y:auto;padding:20px}

/* Command palette */
.cmdk{position:fixed;top:80px;left:50%;transform:translateX(-50%);width:640px;max-width:92vw;background:#fff;border-radius:12px;box-shadow:0 24px 60px rgba(0,0,0,.28);z-index:50;border:1px solid var(--line)}
.cmdk .inp{padding:14px 18px;border-bottom:1px solid var(--line)}
.cmdk .inp input{width:100%;border:0;font-size:15px;outline:none;font-weight:500}
.cmdk .list{max-height:420px;overflow-y:auto;padding:8px}
.cmdk .item{display:flex;gap:10px;padding:10px 12px;border-radius:7px;font-size:13px;align-items:center;cursor:pointer}
.cmdk .item:hover,.cmdk .item.on{background:var(--line-2)}
.cmdk .group{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:700;padding:12px 12px 4px}

/* Tiles */
.grid{display:grid;gap:14px}
.grid.c2{grid-template-columns:repeat(2,minmax(0,1fr))}
.grid.c3{grid-template-columns:repeat(3,minmax(0,1fr))}
.grid.c4{grid-template-columns:repeat(4,minmax(0,1fr))}
.grid.c5{grid-template-columns:repeat(5,minmax(0,1fr))}
.grid.c6{grid-template-columns:repeat(6,minmax(0,1fr))}

/* Tabs */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--line);margin-bottom:18px}
.tabs button{padding:10px 14px;font-size:12.5px;font-weight:600;color:var(--sub);border-bottom:2px solid transparent;margin-bottom:-1px}
.tabs button.on{color:var(--teal);border-color:var(--teal)}
.tabs button:hover{color:var(--ink)}

/* Phase card / KPI */
.kpi{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:16px;min-width:0}
.kpi .lbl{font-size:11.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:700;word-break:break-word}
.kpi .val{font-size:26px;font-weight:800;font-family:"Manrope";color:var(--ink);margin-top:4px;line-height:1.15;word-break:break-word}
.kpi .sub{font-size:12px;color:var(--sub);margin-top:6px;word-break:break-word;line-height:1.4}
.phase-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px}
.phase-card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:16px;position:relative;overflow:hidden}
.phase-card .top{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.phase-card h4{font-size:15px;font-weight:700;margin:2px 0}
.phase-card .meta{font-size:11.5px;color:var(--muted);margin-bottom:10px}
.phase-card .bar{height:6px;background:var(--line);border-radius:3px;overflow:hidden}
.phase-card .bar > div{height:100%}
.phase-card:hover{border-color:var(--teal-2);cursor:pointer}

/* phase-head */
.phase-head{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;padding:10px 0 22px;border-bottom:1px solid var(--line);margin-bottom:22px}
.phase-head h1{font-size:30px;line-height:1.15}
.phase-head .badges{display:flex;gap:6px;flex-wrap:wrap}

/* admin sidebar */
.admin-shell{display:grid;grid-template-columns:260px minmax(0,1fr);min-height:100vh}
.admin-shell .nav{background:#0B2240;color:#CBD5E0;padding:24px 14px;min-height:100vh}
.admin-shell .nav h3{color:#fff;font-size:14px;margin-bottom:14px}
.admin-shell .nav .nav-section{color:#718096;padding:14px 8px 6px}
.admin-shell .nav .nav-link{color:#CBD5E0}
.admin-shell .nav .nav-link:hover{background:rgba(255,255,255,.08)}
.admin-shell .nav .nav-link.on{background:rgba(56,178,172,.15);color:#E6FFFA}
.admin-shell .main{padding:22px 30px 60px;background:var(--bg);min-width:0;overflow-x:hidden}

/* Misc */
.kv{display:grid;grid-template-columns:minmax(140px,auto) 1fr;gap:8px 16px;font-size:13px}
.kv .k{color:var(--muted);font-weight:600;white-space:nowrap}
.kv .v{color:var(--ink);word-break:break-word;min-width:0}
.pill-row{display:flex;gap:4px;flex-wrap:wrap}
.stepper{display:flex;gap:0;border:1px solid var(--line);border-radius:10px;overflow:hidden}
.stepper .step{flex:1;padding:12px 14px;border-right:1px solid var(--line);font-size:12px}
.stepper .step:last-child{border-right:0}
.stepper .step.on{background:#E6FFFA}
.stepper .step .num{font-size:11px;color:var(--muted);font-weight:600}
.stepper .step .lbl{font-weight:700;color:var(--ink);font-size:13px}

/* Gate stepper */
.gate-head{background:linear-gradient(105deg,#0B2240,#1A365D);color:#fff;padding:24px;border-radius:12px;margin-bottom:18px;overflow:hidden}
.gate-head h1{color:#fff;font-size:26px;margin:4px 0 0 0}
.gate-head .chips{margin-top:8px;flex-wrap:wrap}
.gate-head .chip{background:rgba(255,255,255,.15);color:#fff}
.gate-head .gh-row{display:flex;align-items:flex-start;justify-content:space-between;gap:24px;flex-wrap:wrap}
.gate-head .gh-left{flex:1 1 320px;min-width:0}

function parseHash(){
  const h = (location.hash||"").replace(/^#\/?/,"");
  if (!h) return { page:"signin" };
  const parts = h.split("/").filter(Boolean);
  if (parts[0]==="admin")  return { page:"admin", tab: parts[1]||"home", id: parts[2] };
  if (parts[0]==="app")    return { page:"app",   tab: parts[1]||"engagements" };
  if (parts[0]==="eng")    return { page:"eng",   id: parts[1], tab: parts[2]||"overview", sub: parts[3], sub2: parts[4] };
  if (parts[0]==="signup") return { page:"signup" };
  if (parts[0]==="invite") return { page:"invite", id:parts[1] };
  if (parts[0]==="profile")return { page:"profile" };
  return { page:"signin" };
}

/* =====================================================
   UI atoms
   ===================================================== */
function Chip({c, children, style}){ return <span className={"chip"+(c?" "+c:"")} style={style}>{children}</span>; }
function Btn({c, sm, xs, ico, full, danger, children, ...rest}){
  const cls = ["btn", sm&&"sm", xs&&"xs", ico&&"icon", full&&"full", danger&&"danger", c||""].filter(Boolean).join(" ");
  return <button className={cls} {...rest}>{children}</button>;
}
function KPI({lbl, val, sub, color}){
  return <div className="kpi"><div className="lbl">{lbl}</div><div className="val" style={color?{color}:null}>{val}</div>{sub && <div className="sub">{sub}</div>}</div>;
}

/* =====================================================
   Quality Checklist — per-artifact T-G1 / T-G2 / T-G3 checks
   Used by every template and every canonical output.
   ===================================================== */
const CHECKLIST_ITEMS = {
  "T-G1": [
    { id:"g1-1", label:"All required fields are populated",              weight:10 },
    { id:"g1-2", label:"Owner, due date and phase are set",              weight:8  },
    { id:"g1-3", label:"Evidence links resolve to the ledger",           weight:10 },
    { id:"g1-4", label:"Format is publish-ready (no placeholder text)",  weight:8  },
    { id:"g1-5", label:"Version tagged and auto-saved",                   weight:6  }
  ],
  "T-G2": [
    { id:"g2-1", label:"Cross-template references resolve without gaps", weight:12 },
    { id:"g2-2", label:"No open contradictions against the contradiction log", weight:10 },
    { id:"g2-3", label:"Terminology matches method glossary (BUG/DKR/AIR/PTR/SRR/QER/OMR/ACS)", weight:6 },
    { id:"g2-4", label:"Aligned to current policy v1 (T-E1)",             weight:8 },
    { id:"g2-5", label:"Stakeholder roster unchanged since last gate",    weight:4 }
  ],
  "T-G3": [
    { id:"g3-1", label:"Downstream stress test simulated (worst-case)",  weight:12 },
    { id:"g3-2", label:"Risk register reviewed and residual accepted",    weight:10 },
    { id:"g3-3", label:"Operating model can absorb the decision",         weight:8  },
    { id:"g3-4", label:"Value hypothesis signed by Engagement Lead",      weight:6  },
    { id:"g3-5", label:"Exit / rollback path documented",                  weight:4  }
  ]
};

function QualityChecklist({open, onClose, code, title, qa}){
  const [gate, setGate] = useState("T-G1");
  const [checks, setChecks] = useState({});
  if (!open) return null;
  const items = CHECKLIST_ITEMS[gate] || [];
  const score = qa && qa[gate==="T-G1"?"c":gate==="T-G2"?"coh":"cons"];
  const tone = score==null ? "var(--muted)" : score>=90?"var(--teal)":score>=70?"var(--amber)":"var(--red)";
  const toggle = (id)=> setChecks(c => ({...c,[id]:!c[id]}));
  return (
    <div role="dialog" aria-modal="true" style={{position:"fixed",inset:0,background:"rgba(10,20,35,.45)",zIndex:90,display:"flex",justifyContent:"flex-end"}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{width:520,maxWidth:"100%",height:"100%",background:"#fff",boxShadow:"-10px 0 30px rgba(0,0,0,.2)",display:"flex",flexDirection:"column"}}>
        <div style={{padding:"16px 20px",borderBottom:"1px solid var(--line)",display:"flex",alignItems:"center",gap:12}}>
          <div style={{flex:1}}>
            <div className="eyebrow">Quality Checklist</div>
            <h3 style={{margin:"2px 0 0",fontSize:16}}>{code ? code+" · " : ""}{title||"Artifact"}</h3>
          </div>
          <Btn sm ico onClick={onClose} title="Close">✕</Btn>
        </div>
        <div style={{padding:"14px 20px",borderBottom:"1px solid var(--line)",display:"flex",gap:8}}>
          {["T-G1","T-G2","T-G3"].map(g => {
            const label = g==="T-G1"?"Completeness":g==="T-G2"?"Coherence":"Consequence";
            return (
              <button key={g} onClick={()=>setGate(g)} style={{padding:"8px 12px",borderRadius:8,border:"1px solid var(--line)",background:gate===g?"var(--navy)":"#fff",color:gate===g?"#fff":"var(--ink)",fontSize:12,fontWeight:700,cursor:"pointer"}}>
                {g} · {label}
              </button>
            );
          })}
        </div>
        {score!=null && (
          <div style={{padding:"14px 20px",borderBottom:"1px solid var(--line)",display:"flex",alignItems:"center",gap:14}}>
            <div style={{fontSize:32,fontWeight:800,color:tone,minWidth:80}}>{score}%</div>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:700}}>Current {gate} score</div>
              <div className="small muted">Auto-calculated from evidence tier, cross-references and assigned owners. Refresh after each edit.</div>
            </div>
            <Btn sm c="primary" onClick={()=>{/* re-run check (mock) */}}>Re-run check</Btn>
          </div>
        )}
        <div style={{padding:"14px 20px",flex:1,overflowY:"auto"}}>
          <div className="eyebrow" style={{marginBottom:8}}>Checklist items</div>
          {items.map(it => (
            <label key={it.id} style={{display:"flex",gap:12,alignItems:"flex-start",padding:"10px 12px",borderRadius:8,border:"1px solid var(--line-2)",marginBottom:8,cursor:"pointer",background:checks[it.id]?"#F0FDF4":"#fff"}}>
              <input type="checkbox" checked={!!checks[it.id]} onChange={()=>toggle(it.id)} style={{marginTop:3}}/>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600,color:"var(--ink)"}}>{it.label}</div>
                <div className="small muted" style={{marginTop:2}}>Weight: {it.weight} points · evidence required in T-{gate.slice(2)}.</div>
              </div>
              {checks[it.id] && <Chip c="g">Pass</Chip>}
            </label>
          ))}
          <div style={{marginTop:14,padding:12,background:"#F7FAFC",borderRadius:8}}>
            <div className="eyebrow">How this checklist is used</div>
            <div className="small muted" style={{marginTop:6}}>
              Every artifact contributes to its gate score. T-G1 gates Phase 1 handoff, T-G2 gates Phase 2–3, T-G3 gates Phase 3 → Boardpack. The QE / EvalOps Advisory Lead must sign each gate; failing items auto-create remediation actions.
            </div>
          </div>
        </div>
        <div style={{padding:"14px 20px",borderTop:"1px solid var(--line)",display:"flex",gap:10,justifyContent:"flex-end"}}>
          <Btn sm onClick={onClose}>Cancel</Btn>
          <Btn sm c="primary" onClick={onClose}>Save &amp; close</Btn>
        </div>
      </div>
    </div>
  );
}

function QualityBadge({qa, onOpen}){
  const score = qa ? Math.round((qa.c + qa.coh + qa.cons)/3) : 0;
  const tone = score>=90?"g":score>=70?"a":"r";
  return (
    <button onClick={onOpen} title="Open Quality Checklist (T-G1 / T-G2 / T-G3)"
      style={{display:"inline-flex",alignItems:"center",gap:8,padding:"6px 12px",borderRadius:999,border:"1px solid var(--line)",background:"#fff",cursor:"pointer",fontSize:12,fontWeight:700,color:"var(--ink)"}}>
      <span style={{fontSize:14}}>✓</span>
      <span>Quality Checklist</span>
      <Chip c={tone}>{score}%</Chip>
    </button>
  );
}

/* Horizontal Phase + Gate nav bar — gates interleaved per method placement */
function PhaseGateBar({eng, tab, sub}){
  const phasePct = {1:100, 2:72, 3:12, 4:0};
  const gateState = {
    "scope":     {cls:"pass", label:"Cleared"},
    "shortlist": {cls:"pass", label:"Cleared"},
    "evidence":  {cls:"now",  label:"In flight"},
    "decision":  {cls:"next", label:"Queued"}
  };
  const GatePill = ({g}) => {
    const on = tab==="gate" && sub===g.slug;
    const st = gateState[g.slug] || {cls:"next", label:"Queued"};
    return (
      <button className={"pggate"+(on?" on":"")+(" "+st.cls)} onClick={()=>go(`eng/${eng.id}/gate/${g.slug}`)} title={`${g.label} — ${g.placement} · ${g.crit}`}>
        <span className="gdot" aria-hidden="true">◆</span>
        <span className="gnum">G{g.num}</span>
        <span className={"gst "+st.cls}>{st.label}</span>
      </button>
    );
  };
  const PhasePill = ({p}) => {
    const on = tab==="phase" && sub===p.slug;
    const pct = phasePct[p.num] || 0;
    return (
      <button className={"pgpill"+(on?" on":"")} onClick={()=>go(`eng/${eng.id}/phase/${p.slug}`)} title={`Phase ${p.num} · ${p.label} — ${pct}% complete`}>
        <span className="pgnum" style={on?null:{color:p.color}}>P{p.num}</span>
        <span>{p.label}</span>
        <span className="pctbar"><div style={{width:pct+"%"}}/></span>
      </button>
    );
  };
  const gateByAfter = (n) => GATES.find(g => g.after === n);
  const preP1 = GATES.find(g => g.after === null); // G1
  return (
    <>
      <span className="grp-lbl">Phases &amp; Gates</span>
      {preP1 && <GatePill g={preP1}/>}
      {PHASES.map((p,i) => (
        <React.Fragment key={p.slug}>
          <PhasePill p={p}/>
          {gateByAfter(p.num) && <GatePill g={gateByAfter(p.num)}/>}
        </React.Fragment>
      ))}
    </>
  );
}

function EngShell({eng, tab, sub, children}){
  const [railOpen, setRailOpen] = useState(true);
  const [cmdOpen, setCmdOpen] = useState(false);
  const [newOpen, setNewOpen] = useState(false);
  useEffect(() => {
    const handler = (e) => {
      if ((e.metaKey||e.ctrlKey) && e.key==="k") { e.preventDefault(); setCmdOpen(o=>!o); }
      if (e.key==="Escape") { setCmdOpen(false); setNewOpen(false); }
      if (e.key==="n" && !e.metaKey && !e.ctrlKey && !e.altKey) {
        const tag = (e.target && e.target.tagName) || "";
        if (tag!=="INPUT" && tag!=="TEXTAREA" && tag!=="SELECT") { e.preventDefault(); setNewOpen(o=>!o); }
      }
    };
    const tgl = () => setCmdOpen(o=>!o);
    window.addEventListener("keydown", handler);
    window.addEventListener("cmdk", tgl);
    return () => { window.removeEventListener("keydown", handler); window.removeEventListener("cmdk", tgl); };
  },[]);
  return (
    <div className={"three-zone"+(railOpen?"":" no-rail")}>
      <aside className="nav"><EngNavRail eng={eng} tab={tab} sub={sub}/></aside>
      <header className="top"><EngTopbar eng={eng} tab={tab} sub={sub} onCmdK={()=>setCmdOpen(true)} onToggleRail={()=>setRailOpen(o=>!o)} railOpen={railOpen} onNew={()=>setNewOpen(true)}/></header>
      <nav className="pgbar"><PhaseGateBar eng={eng} tab={tab} sub={sub}/></nav>
      <main className="main">{children}</main>
      {railOpen && <aside className="rail"><InsightRail eng={eng}/></aside>}
      <footer className="meter"><GateMeter eng={eng}/></footer>
      {cmdOpen && <CommandPalette eng={eng} onClose={()=>setCmdOpen(false)}/>}
      {newOpen && <NewEntityModal eng={eng} onClose={()=>setNewOpen(false)}/>}
    </div>
  );
}

                <div key={it.h} className="item" onClick={()=>{go(it.h);onClose();}}>

                  <span style={{flex:1}}>{it.t}</span>

                </div>
              ))}
            </Fragment>
          ))}
        </div>
        <div style={{padding:"10px 16px",borderTop:"1px solid var(--line)",display:"flex",gap:14,fontSize:11,color:"var(--muted)"}}>
          <span><span className="kbd" style={{background:"#F7FAFC",padding:"1px 5px",borderRadius:3,border:"1px solid var(--line)"}}>↵</span> open</span>

function ReadinessOctagon({dims}){
  // Full-size SVG octagon spider chart with non-truncated multi-line labels.
  // Rendered in a wide viewBox so the full pane can be used without truncation.
  const W = 1100, H = 640;
  const cx = W/2, cy = H/2 + 10, r = 230;
  const wrap = (s, maxLen=24) => {
    const words = s.split(" ");
    const lines = [""];
    for (const w of words) {
      if ((lines[lines.length-1] + " " + w).trim().length <= maxLen) {
        lines[lines.length-1] = (lines[lines.length-1] ? lines[lines.length-1] + " " : "") + w;
      } else {
        lines.push(w);
      }
    }
    return lines.slice(0, 2);
  };
  const pts = dims.map((d,i) => {
    const ang = (Math.PI*2 * i)/dims.length - Math.PI/2;
    const rr = (d.score/5) * r;
    return [cx + rr*Math.cos(ang), cy + rr*Math.sin(ang)];
  });
  const outer = dims.map((d,i) => {
    const ang = (Math.PI*2 * i)/dims.length - Math.PI/2;
    return [cx + r*Math.cos(ang), cy + r*Math.sin(ang)];
  });
  const path = pts.map(p => p.join(",")).join(" ");
  const colors = {A:"#2F855A",B:"#D69E2E",C:"#C53030"};
  const tierLabel = {A:"Tier A",B:"Tier B",C:"Tier C"};
  return (
    <svg className="oct" width="100%" viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="xMidYMid meet" style={{width:"100%",height:"auto",maxHeight:640,display:"block"}} role="img" aria-label="8-Dimension Readiness spider chart">
      {/* Gridlines: five pentagon/octagon rings */}
      {[1,2,3,4,5].map(lv => (
        <polygon key={lv} points={outer.map(([x,y],i) => {
          const ang = (Math.PI*2 * i)/dims.length - Math.PI/2;
          const rr = (lv/5) * r;
          return [cx + rr*Math.cos(ang), cy + rr*Math.sin(ang)].join(",");
        }).join(" ")} fill={lv===5?"#F7FAFC":"none"} stroke="#E2E8F0" strokeWidth="1"/>
      ))}
      {/* Scale labels along the top spoke: 1..5 */}
      {[1,2,3,4,5].map(lv => {
        const ang = -Math.PI/2;
        const ly = cy + (lv/5)*r*Math.sin(ang) - 6;
        return <text key={"l"+lv} x={cx+6} y={ly} fontSize="11" fill="#A0AEC0" fontFamily="JetBrains Mono, monospace">{lv}</text>;
      })}
      {/* Spokes */}
      {outer.map(([x,y],i) => <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke="#E2E8F0"/>)}
      {/* Score polygon */}
      <polygon points={path} fill="rgba(56,178,172,0.25)" stroke="#0E7C7B" strokeWidth="2.5"/>
      {dims.map((d,i) => {
        const ang = (Math.PI*2 * i)/dims.length - Math.PI/2;
        const labelR = r + 75;
        const lx = cx + labelR*Math.cos(ang), ly = cy + labelR*Math.sin(ang);
        let anchor = "middle";
        if (Math.cos(ang) > 0.3)  anchor = "start";
        if (Math.cos(ang) < -0.3) anchor = "end";
        const lines = wrap(d.name, 26);
        return (
          <g key={d.k}>
            <circle cx={pts[i][0]} cy={pts[i][1]} r="7" fill={colors[d.tier]} stroke="#fff" strokeWidth="2.5"/>
            <text x={pts[i][0]} y={pts[i][1]-12} textAnchor="middle" fontSize="12" fontWeight="800" fill={colors[d.tier]} fontFamily="Manrope, sans-serif">{d.score.toFixed(1)}</text>
            <text x={lx} y={ly-14} textAnchor={anchor} fontSize="16" fontWeight="800" fill="#1A365D" fontFamily="Manrope, sans-serif">{d.k}</text>
            {lines.map((ln,li) => (
              <text key={li} x={lx} y={ly+4+li*14} textAnchor={anchor} fontSize="12.5" fill="#2D3748">{ln}</text>
            ))}
            <text x={lx} y={ly+4+lines.length*14+2} textAnchor={anchor} fontSize="11" fontWeight="700" fill={colors[d.tier]}>{tierLabel[d.tier]} · {d.band} · {d.conf} confidence</text>
          </g>
        );
      })}
      {/* Legend */}
      <g transform={`translate(${24}, ${24})`}>
        <text x={0} y={0} fontSize="11" fontWeight="700" fill="#2D3748" letterSpacing=".06em">LEGEND</text>
        <circle cx={10} cy={18} r="6" fill="#2F855A"/>
        <text x={22} y={22} fontSize="11.5" fill="#2D3748">Tier A — Strong evidence</text>
        <circle cx={10} cy={38} r="6" fill="#D69E2E"/>
        <text x={22} y={42} fontSize="11.5" fill="#2D3748">Tier B — Partial evidence</text>
        <circle cx={10} cy={58} r="6" fill="#C53030"/>
        <text x={22} y={62} fontSize="11.5" fill="#2D3748">Tier C — Weak / missing</text>
      </g>
    </svg>
  );
}

function ValueWaterfall({layers, total}){
  // McKinsey-style waterfall: Baseline → signed layer contributions → Net Total
  // Positive contributions (Drivers, Enablers) go up in teal; negative contributions
  // (Constraints, Shocks — costs / risk deductions) go DOWN in red. Total bar is
  // grounded to 0 in navy.
  const steps = [
    { label:"Baseline", type:"start", value:0, low:0, high:0, sign:0 },
    ...layers.map(l => {
      const s = l.sign || 1;
      return {
        label: l.layer,
        type: "delta",
        sign: s,
        value: s * l.exp,                                  // signed delta
        // signed low/high bounds for the range caption beneath each bar
        low:  s < 0 ? -l.high : l.low,
        high: s < 0 ? -l.low  : l.high
      };
    }),
    { label:"Net (Expected)", type:"total", value: total.exp, low: total.low, high: total.high, sign:0 }
  ];
  const W = 880, H = 460;
  const mL = 80, mR = 30, mT = 48, mB = 92;
  const plotW = W - mL - mR;
  const plotH = H - mT - mB;

  // Determine y-axis bounds: need to cover running extremes AND Low/High of total.
  let running = 0, minR = 0, maxR = 0;
  for (const s of steps) {
    if (s.type === "delta") {
      running += s.value;
      if (running < minR) minR = running;
      if (running > maxR) maxR = running;
    }
  }
  const yHiRaw = Math.max(maxR, total.high);
  const yLoRaw = Math.min(minR, total.low, 0);
  const yMax = Math.ceil(yHiRaw + 1.0);
  const yMin = Math.floor(yLoRaw - 0.5);
  const yScale = v => mT + plotH - ((v - yMin) / (yMax - yMin)) * plotH;
  const slotW = plotW / steps.length;
  const barW = Math.min(74, slotW - 22);
  const colCenter = i => mL + slotW * (i + 0.5);
  const colLeft   = i => colCenter(i) - barW/2;
  const colRight  = i => colCenter(i) + barW/2;

  // Re-scan to build rendered bars
  running = 0;
  const rendered = steps.map((s, i) => {
    let yTop, yBot, fill, stroke, running_before=running, running_after;
    if (s.type === "start") {
      running_after = 0;
      yTop = yScale(0); yBot = yScale(0);
      fill = "#A0AEC0"; stroke = "#4A5568";
    } else if (s.type === "total") {
      running_after = s.value;
      // Ground bar spans 0 to total.value (either direction)
      const top = Math.max(0, s.value); const bot = Math.min(0, s.value);
      yTop = yScale(top); yBot = yScale(bot);
      fill = s.value >= 0 ? "#0B2240" : "#742A2A";
      stroke = fill;
    } else {
      running_after = running + s.value;
      const top = Math.max(running_before, running_after);
      const bot = Math.min(running_before, running_after);
      yTop = yScale(top); yBot = yScale(bot);
      if (s.value >= 0) { fill = "#38B2AC"; stroke = "#0E7C7B"; }
      else              { fill = "#E53E3E"; stroke = "#9B2C2C"; }
    }
    running = running_after;
    return { ...s, i, yTop, yBot, running_before, running_after, fill, stroke };
  });

  // Y-axis gridlines at integer steps
  const yTicks = [];
  for (let v = yMin; v <= yMax; v += 1) yTicks.push(v);

  return (
    <div style={{width:"100%",overflow:"visible"}}>
      <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{display:"block",maxHeight:480,height:"auto"}} role="img" aria-label="Value waterfall chart — McKinsey-style">
        {/* Gridlines + y-axis labels */}
        {yTicks.map(v => (
          <g key={v}>
            <line x1={mL} y1={yScale(v)} x2={W-mR} y2={yScale(v)} stroke={v===0 ? "#2D3748" : "#E2E8F0"} strokeWidth={v===0 ? 1.3 : 1} strokeDasharray={v===0 ? "0" : "3 4"}/>
            <text x={mL-10} y={yScale(v)+4} textAnchor="end" fontSize="11.5" fill="#718096" fontFamily="JetBrains Mono, monospace">{v<0?`-$${Math.abs(v)}M`:`$${v}M`}</text>
          </g>
        ))}
        {/* Y-axis title */}
        <text x={18} y={mT + plotH/2} textAnchor="middle" transform={`rotate(-90 18 ${mT + plotH/2})`} fontSize="11" fill="#2D3748" fontWeight="700" letterSpacing=".08em">NET VALUE ($M / YEAR)</text>

        {/* Connectors — dotted lines between bar tops */}
        {rendered.map((s, i) => {
          if (i === rendered.length - 1) return null;
          const next = rendered[i+1];
          let y;
          if (next.type === "total")      y = yScale(0);          // total is grounded — connector joins baseline
          else                            y = yScale(s.running_after);
          return <line key={"c"+i} x1={colRight(i)} y1={y} x2={colLeft(i+1)} y2={y} stroke="#A0AEC0" strokeWidth={1.2} strokeDasharray="4 3"/>;
        })}

        {/* Bars */}
        {rendered.map((s, i) => {
          if (s.type === "start") {
            return (
              <g key={s.label+i}>
                <rect x={colLeft(i)} y={yScale(0)-2} width={barW} height={4} fill="#A0AEC0"/>
                <text x={colCenter(i)} y={yScale(0)-8} textAnchor="middle" fontSize="12" fill="#2D3748" fontWeight="700">$0.0M</text>
              </g>
            );
          }
          const h = Math.max(2, s.yBot - s.yTop);
          const lblText = s.type === "total"
            ? (s.value<0 ? `−$${Math.abs(s.value).toFixed(1)}M` : `$${s.value.toFixed(1)}M`)
            : (s.value>=0 ? `+$${s.value.toFixed(1)}M` : `−$${Math.abs(s.value).toFixed(1)}M`);
          const lblY = s.value >= 0 ? s.yTop - 8 : s.yBot + 16;
          const lblColor = s.type === "total" ? "#0B2240" : (s.value>=0 ? "#1A365D" : "#742A2A");
          // Range caption position: place below the bar (or above if bar is negative and extends down)
          const rangeY = s.value >= 0 ? s.yBot + 16 : s.yTop - 8;
          return (
            <g key={s.label+i}>
              <rect x={colLeft(i)} y={s.yTop} width={barW} height={h} fill={s.fill} stroke={s.stroke} strokeWidth={1}/>
              <text x={colCenter(i)} y={lblY} textAnchor="middle" fontSize="13" fontWeight="800" fill={lblColor} fontFamily="Manrope, sans-serif">{lblText}</text>
              <text x={colCenter(i)} y={rangeY} textAnchor="middle" fontSize="10.5" fill="#718096" fontFamily="JetBrains Mono, monospace">
                {`${s.low>=0?"":"−"}$${Math.abs(s.low).toFixed(1)} · ${s.high>=0?"":"−"}$${Math.abs(s.high).toFixed(1)}`}
              </text>
            </g>
          );
        })}

        {/* X-axis labels — with signed contribution suffix */}
        {rendered.map((s, i) => (
          <g key={"xl"+i}>
            <text x={colCenter(i)} y={H-mB+42} textAnchor="middle" fontSize="12" fontWeight="600" fill="#2D3748">{s.label}</text>
            {s.type==="delta" && (
              <text x={colCenter(i)} y={H-mB+58} textAnchor="middle" fontSize="10.5" fill={s.sign>0?"#2F855A":"#9B2C2C"} fontWeight="700">
                {s.sign>0?"Additive (+)":"Subtractive (−)"}
              </text>
            )}
          </g>
        ))}
        {/* Footer */}
        <text x={mL} y={H-10} fontSize="10.5" fill="#718096">Numbers beside each bar = Low · High range ($M/year). Net = Σ(Drivers, Enablers) − Σ(Constraints, Shocks).</text>

        {/* Legend */}
        <g transform={`translate(${W-mR-360}, 14)`}>
          <rect x={0} y={0} width={12} height={12} fill="#38B2AC"/>
          <text x={18} y={10} fontSize="11" fill="#2D3748">Value creator (additive)</text>
          <rect x={150} y={0} width={12} height={12} fill="#E53E3E"/>
          <text x={168} y={10} fontSize="11" fill="#2D3748">Cost / risk (subtractive)</text>
          <rect x={300} y={0} width={12} height={12} fill="#0B2240"/>
          <text x={318} y={10} fontSize="11" fill="#2D3748">Net total</text>
        </g>
      </svg>
    </div>
  );
}

function EngValue({eng}){
  // Signed totals: Drivers/Enablers are additive; Constraints/Shocks are subtractive (costs & risk deductions).
  // Worst-case Low pairs lowest benefit with highest cost; best-case High pairs highest benefit with lowest cost.
  const tot = VALUE_LAYERS.reduce((a,v)=>{
    if ((v.sign||1) < 0) return { low: a.low - v.high, exp: a.exp - v.exp, high: a.high - v.low };
    return { low: a.low + v.low, exp: a.exp + v.exp, high: a.high + v.high };
  }, { low:0, exp:0, high:0 });
  const fmt = n => `${n<0?"-":""}$${Math.abs(n).toFixed(1)}M`;
  return (
    <>
      <div className="phase-head"><div><div className="eyebrow">Phase 2 · T-C1</div><h1>AI Value Ledger™</h1><p className="muted" style={{marginTop:6}}>Net-of-cost value: Drivers + Enablers add value; Constraints and Shocks are subtracted. Values in $M/year.</p></div><Btn c="primary" onClick={()=>go(`eng/${eng.id}/output/value`)}>View method output →</Btn></div>

      <div className="grid c4" style={{marginBottom:18}}>
        <KPI lbl="Net — Low" val={fmt(tot.low)} sub="Worst-case benefits vs. worst-case costs"/>
        <KPI lbl="Net — Expected" val={fmt(tot.exp)} color="var(--teal)" sub="Most likely net of costs"/>
        <KPI lbl="Net — High" val={fmt(tot.high)} sub="Best-case benefits vs. best-case costs"/>
        <KPI lbl="Confidence" val="Medium" sub="Assumes 2 contradictions resolve"/>
      </div>

      <div className="card" style={{marginBottom:14}}><div className="hd"><h3>Envelope by layer</h3><span className="sub">Costs and risk deductions are shown as negative contributions to net value.</span></div><div className="bd" style={{padding:0}}>
        <table className="tbl"><thead><tr><th>Layer</th><th>Direction</th><th className="num">Low</th><th className="num">Expected</th><th className="num">High</th><th>Key drivers</th></tr></thead><tbody>
          {VALUE_LAYERS.map(v => {
            const s = v.sign || 1;
            const net = (n) => s < 0 ? -n : n;   // signed contribution for display
            return (
              <tr key={v.layer}><td><b>{v.layer}</b></td>
                <td><Chip c={s>0?"g":"r"}>{s>0?"+ Additive":"− Subtractive"}</Chip></td>
                <td className="num">{fmt(net(s<0?v.high:v.low))}</td>
                <td className="num"><b>{fmt(net(v.exp))}</b></td>
                <td className="num">{fmt(net(s<0?v.low:v.high))}</td>
                <td className="muted">{v.key}</td>
              </tr>
            );
          })}
          <tr style={{background:"#F7FAFC"}}>
            <td><b>Net</b></td>
            <td className="muted small">Sum of signed contributions</td>
            <td className="num"><b>{fmt(tot.low)}</b></td>
            <td className="num"><b style={{color:"var(--teal)"}}>{fmt(tot.exp)}</b></td>
            <td className="num"><b>{fmt(tot.high)}</b></td>
            <td className="muted small">Most-likely net: {fmt(tot.exp)}</td>
          </tr>
        </tbody></table>
      </div></div>

      <div className="card"><div className="hd"><h3>Value waterfall — Expected $M/year</h3><span className="sub">Baseline → value creators (+) → cost &amp; risk deductions (−) → net value. Ranges shown Low · High.</span></div><div className="bd"><ValueWaterfall layers={VALUE_LAYERS} total={tot}/></div></div>
    </>
  );
}

/* =====================================================
   ENGAGEMENT ROUTER
   ===================================================== */
function EngRouter({eng, tab, sub, sub2}){
  let page;
  if (tab==="overview" || !tab) page = <EngOverview eng={eng}/>;
  else if (tab==="phase") page = <PhasePage eng={eng} slug={sub}/>;
  else if (tab==="gate") page = <GateRoom eng={eng} slug={sub}/>;
  else if (tab==="output") {
    if (sub==="portfolio") page = <OutputPortfolio eng={eng}/>;
    else if (sub==="value") page = <OutputValue eng={eng}/>;
    else if (sub==="readiness") page = <OutputReadiness eng={eng}/>;
    else if (sub==="governance") page = <OutputGovernance eng={eng}/>;
    else if (sub==="boardpack") page = <OutputBoardpack eng={eng}/>;
    else page = <OutputPortfolio eng={eng}/>;
  }
  else if (tab==="templates") {
    if (sub) page = <TemplateWorkspace eng={eng} code={sub}/>;
    else page = <EngTemplates eng={eng}/>;
  }
  else if (tab==="stakeholders") {
    if (sub) page = <StakeholderDetail eng={eng} id={sub}/>;
    else page = <EngStakeholders eng={eng}/>;
  }
  else if (tab==="usecases") {
    if (sub==="contradictions") {
      if (sub2) page = <ContradictionDetail eng={eng} id={sub2}/>;
      else page = <EngUseCases eng={eng}/>;
    } else if (sub==="assumptions") {
      page = <EngUseCases eng={eng}/>;
    } else if (sub) {
      page = <UseCaseDetail eng={eng} id={sub}/>;
    } else page = <EngUseCases eng={eng}/>;
  }
  else if (tab==="evidence") {
    if (sub) page = <EvidenceDetail eng={eng} id={sub}/>;
    else page = <EngEvidence eng={eng}/>;
  }
  else if (tab==="readiness") {
    if (sub && sub!=="remediation") page = <DimensionDetail eng={eng} id={sub}/>;
    else page = <EngReadiness eng={eng}/>;
  }
  else if (tab==="value")   page = <EngValue eng={eng}/>;
  else if (tab==="team")    page = <EngTeam eng={eng}/>;
  else if (tab==="settings")page = <EngSettings eng={eng}/>;
  else page = <EngOverview eng={eng}/>;
  return <EngShell eng={eng} tab={tab} sub={sub}>{page}</EngShell>;
}

/* =====================================================
   ROOT APP
   ===================================================== */
function App(){
  const [route, setRoute] = useState(parseHash());
  useEffect(() => {
    const h = () => setRoute(parseHash());
    window.addEventListener('hashchange', h);
    return () => window.removeEventListener('hashchange', h);
  },[]);
  const { page, tab, id, sub, sub2 } = route;

  if (page==="signin")  return <SignIn/>;
  if (page==="signup")  return <SignUp/>;
  if (page==="invite")  return <InviteAccept token={id}/>;
  if (page==="profile") return <ProfilePage/>;
  if (page==="admin")   return <AdminRouter tab={tab} id={id}/>;
  if (page==="app")     return <AppRouter tab={tab}/>;
  if (page==="eng") {
    const eng = ENGAGEMENTS.find(e=>e.id===id) || ENGAGEMENTS[0];
    return <EngRouter eng={eng} tab={tab} sub={sub} sub2={sub2}/>;
  }
  return <SignIn/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
